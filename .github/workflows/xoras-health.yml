name: 🧠 XORAS — Ollama Health Check

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'xoras/**'
      - 'src/lib/agents/**'

jobs:
  lint-and-typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript Type Check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: ESLint Check
        run: npx eslint xoras/ src/lib/ --ext .ts,.tsx --max-warnings 20
        continue-on-error: true

      - name: Report
        run: |
          echo "✅ XORAS TypeScript check complete"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
