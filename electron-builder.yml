appId: com.SOVRA_APEX.jarvis
productName: Maxx Sovereign Executive
directories:
  output: dist
  buildResources: public
files:
  - dist/**/*
  - node_modules/**/*
  - package.json
  - electron/**/*
mac:
  target:
    - dmg
  icon: public/favicon.ico
  category: public.app-category.business
win:
  target: nsis
  icon: public/favicon.ico
linux:
  target:
    - AppImage
